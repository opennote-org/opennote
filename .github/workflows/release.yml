name: Build and attach to release

on:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Make build script executable
        run: chmod +x ./scripts/build_release_mac.sh

      - name: Build & package DMG
        run: ./scripts/build_release_mac.sh

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v1
        with:
          files: target/OpenNote.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Build & package ZIP
        run: pwsh -File ./scripts/build_release_windows.ps1

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v1
        with:
          files: target/opennote-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Make build script executable
        run: chmod +x ./scripts/build_release_linux.sh

      - name: Build & package tar.gz
        run: ./scripts/build_release_linux.sh

      - name: Upload tar.gz to release
        uses: softprops/action-gh-release@v1
        with:
          files: target/opennote-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
